name: SQLMap Security Test

on:
  workflow_dispatch:

jobs:
  sqlmap-test:
    runs-on: ubuntu-latest

    steps:
      # Download repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install SQLMap
      - name: Install SQLMap
        run: |
          python -m pip install --upgrade pip
          pip install sqlmap

      # Run SQL injection scan against deployed Render login page
      - name: Run SQLMap Login Scan
        run: |
          sqlmap -u "https://smartlocker-fb15.onrender.com/login" --forms --batch --random-agent --level=1 --risk=1