name: SmartLocker Tests

# Trigger pipeline automatically
on:

  # Run when code is pushed to main branch
  push:
    branches:
      - main

  # Run when a Pull Request targets main branch
  pull_request:
    branches:
      - main

# Define jobs to execute
jobs:

  # Test job
  test:

    # Create temporary Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:

      # Download repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Python runtime
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install application dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Create Smart Locker database and seed test data
      - name: Create Database
        run: |
          mkdir -p instance
          python seed.py

      # Execute automated test suite
      - name: Run Tests
        run: |
          python -m pytest